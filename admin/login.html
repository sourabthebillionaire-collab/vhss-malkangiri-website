<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login — VHSS</title>
<link rel="stylesheet" href="../css/admin.css"/>
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(140deg, #061240 0%, #0a1f5c 60%, #162d7a 100%); }
.login-card { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 80px rgba(0,0,0,0.35); }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .logo-circle { width: 70px; height: 70px; background: var(--saffron); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: var(--navy-dark); margin: 0 auto 14px; font-family: 'Inter', sans-serif; }
.login-logo h1 { font-size: 20px; color: var(--navy); margin-bottom: 4px; }
.login-logo p { font-size: 13px; color: var(--mid-gray); }
.admin-tag { display: inline-block; background: rgba(192,57,43,0.1); color: var(--red); font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 20px; margin-top: 6px; letter-spacing: 1px; }
.login-form { margin-top: 8px; }
.pass-wrap { position: relative; }
.pass-wrap input { padding-right: 44px; }
.toggle-pass { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: var(--mid-gray); }
.login-btn { width: 100%; padding: 14px; background: var(--navy); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: var(--transition); margin-top: 8px; }
.login-btn:hover { background: var(--navy-light); }
.login-btn:active { transform: scale(0.98); }
.back-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--mid-gray); }
.back-link a { color: var(--saffron); font-weight: 600; }
.error-msg { background: rgba(192,57,43,0.08); border: 1px solid rgba(192,57,43,0.2); color: var(--red); padding: 10px 14px; border-radius: 8px; font-size: 13.5px; display: none; margin-bottom: 16px; }
.error-msg.show { display: block; }
.hint-box { background: var(--off-white); border-radius: 8px; padding: 12px 14px; font-size: 12.5px; color: var(--mid-gray); margin-top: 20px; border-left: 3px solid var(--saffron); }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="logo-circle">V</div>
    <h1>Vivekananda HSS</h1>
    <p>Malkangiri, Odisha</p>
    <span class="admin-tag">🔐 ADMIN PANEL</span>
  </div>
  <div class="login-form">
    <div class="error-msg" id="errMsg">❌ Incorrect password. Please try again.</div>
    <div class="form-group">
      <label>Admin Password</label>
      <div class="pass-wrap">
        <input type="password" id="passInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="toggle-pass" onclick="togglePass()" id="toggleBtn">👁️</button>
      </div>
    </div>
    <button class="login-btn" onclick="doLogin()">🔓 Login to Admin Panel</button>
  </div>
  <div class="hint-box">
    <strong>Default password:</strong> vhss@admin2025<br>
    Contact your site administrator if you've forgotten the password.
  </div>
  <div class="back-link"><a href="../index.html">← Back to Main Website</a></div>
</div>

<script src="../js/data.js"></script>
<script>
// Redirect if already logged in
if (isAdminLoggedIn()) window.location.href = 'dashboard.html';

function doLogin() {
  const pass = document.getElementById('passInput').value;
  const err = document.getElementById('errMsg');
  if (adminLogin(pass)) {
    window.location.href = 'dashboard.html';
  } else {
    err.classList.add('show');
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
    setTimeout(() => err.classList.remove('show'), 3000);
  }
}

function togglePass() {
  const inp = document.getElementById('passInput');
  const btn = document.getElementById('toggleBtn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}
</script>
</body>
</html>
